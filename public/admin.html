<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Sites d'intervention</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loginView" class="login-box">
    <h2>Connexion admin</h2>
    <input type="password" id="passwordInput" placeholder="Mot de passe" />
    <button id="loginBtn">Se connecter</button>
    <div id="loginError" class="error-msg"></div>
  </div>

  <div id="adminView" class="hidden">
    <header class="topbar">
      <h1>Administration des points</h1>
      <div>
        <a href="index.html" class="admin-link">Voir la carte</a>
        <button id="logoutBtn" class="btn secondary" style="margin-left:8px;">Déconnexion</button>
      </div>
    </header>

    <div class="admin-container">
      <div class="admin-toolbar">
        <select id="filterType" style="padding:8px; border:1px solid #dbe1e6; border-radius:6px;">
          <option value="all">Recherche libre</option>
          <option value="ig">Identifiant géographique (IG)</option>
          <option value="adresse">Adresse</option>
          <option value="batiment">Numéro de bâtiment</option>
        </select>
        <input type="text" id="filterInput" placeholder="Rechercher..." style="flex:1; padding:8px; border:1px solid #dbe1e6; border-radius:6px;" />
        <button class="btn" id="addBtn">+ Ajouter un point</button>
        <label class="btn secondary" style="margin:0;">
          Importer mise à jour (Excel)
          <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none;" />
        </label>
        <label class="btn secondary" style="margin:0;">
          Importer SHP (.zip)
          <input type="file" id="importShpFile" accept=".zip" style="display:none;" />
        </label>
        <label class="btn secondary" style="margin:0;">
          Importer KML
          <input type="file" id="importKmlFile" accept=".kml" style="display:none;" />
        </label>
      </div>
      <div id="importStatus" class="import-status"></div>

      <div class="admin-toolbar" style="margin-top:0;">
        <button class="btn secondary" id="selectAllBtn">☑ Tout sélectionner</button>
        <button class="btn secondary" id="deselectAllBtn">☐ Tout désélectionner</button>
        <button class="btn danger" id="deleteSelectedBtn">🗑 Supprimer la sélection</button>
        <button class="btn secondary" id="zoomSelectedBtn">🔍 Zoomer sur la sélection</button>
        <span id="selectionInfo" style="font-size:0.85rem; color:#555;"></span>
      </div>

      <div id="gmapsLinkBar" class="gmaps-link-bar hidden">
        <span>Lien Google Maps :</span>
        <input type="text" id="gmapsLinkInput" readonly />
        <button class="btn secondary" id="gmapsCopyBtn">Copier</button>
      </div>

      <div id="adminMap" style="height:280px; border-radius:6px; margin-bottom:14px; display:none;"></div>

      <table class="admin-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="headerCheckbox" /></th>
            <th>ID</th><th>IG</th><th>Adresse</th><th>N° Bâtiment</th><th>Secteur</th><th>X</th><th>Y</th><th>Lat</th><th>Lng</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="pointsTableBody"></tbody>
      </table>

      <div class="pagination">
        <button id="prevPage">« Précédent</button>
        <span id="pageInfo"></span>
        <button id="nextPage">Suivant »</button>
      </div>
    </div>
  </div>

  <!-- Modal ajout/édition -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 id="modalTitle">Ajouter un point</h3>
      <input type="hidden" id="editId" />
      <label>Numéro IG</label>
      <input type="text" id="fIg" />
      <label>Adresse</label>
      <input type="text" id="fAdresse" />
      <label>Numéro de bâtiment</label>
      <input type="text" id="fNumBatiment" />
      <label>Secteur (numéro)</label>
      <input type="text" id="fSecteurNumero" />
      <label>Emplacement (cliquez sur la carte pour placer le point)</label>
      <div id="pickerMap" style="height:220px; border-radius:6px; margin-bottom:6px;"></div>
      <div style="display:flex; gap:10px; font-size:0.82rem; color:#555; margin-bottom:4px;">
        <span>X: <span id="fXDisplay">—</span></span>
        <span>Y: <span id="fYDisplay">—</span></span>
      </div>
      <input type="hidden" id="fX" />
      <input type="hidden" id="fY" />
      <input type="hidden" id="fLat" />
      <input type="hidden" id="fLng" />
      <input type="hidden" id="fSecteurNom" />
      <label>Commentaire</label>
      <textarea id="fCommentaire" rows="2"></textarea>
      <div id="modalError" class="error-msg"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="modalCancel">Annuler</button>
        <button class="btn" id="modalSave">Enregistrer</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">Créé par Amar Abderrazaq</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
